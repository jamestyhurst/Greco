# Alembic configuration for Greco Web.
# The database URL is set dynamically in alembic/env.py (derived from
# web.db._DB_PATH), so sqlalchemy.url here is a placeholder.

[alembic]
# Path to migration scripts
script_location = alembic

# Placeholder — overridden in env.py
sqlalchemy.url = sqlite:///placeholder.db

# Template for new migration files
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
