name: CI

# Run the test suite on every push and pull request so each commit gets a
# green check. CI runs on GitHub's runners, NOT this machine — so it does not
# trip the local antivirus the way a scheduled local task would.
#
# Hermeticity: the whole suite is engine- and key-free by design. The Stockfish
# binary and the Anthropic API key are NOT available here, and they are not
# needed — the web tests monkeypatch the pipeline, the analyzer tests build
# dataclasses with dummy FENs, and the knowledge FTS5 tests skip themselves when
# the (gitignored) corpus DB is absent. So no ANTHROPIC_API_KEY / Stockfish step
# is ever added: that absence is the point.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'   # match the dev venv (3.14.6); float the patch
          cache: 'pip'

      - name: Install Tk (test_gui_imports imports gui -> tkinter at module top)
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest
